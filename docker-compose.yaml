name: betafit

services:
  db:
    image: mysql:8.0
    container_name: betafit-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exercise_app
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/data:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build: 
      context: backend
      dockerfile: Dockerfile
    container_name: betafit-backend
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
    command: >
      gunicorn
      --reload
      --bind 0.0.0.0:8000
      app.main:app   
  frontend:
    build: 
      context: frontend
      dockerfile: Dockerfile
    container_name: betafit-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm run dev --host"

volumes:
  mysql_data:
  node_modules: